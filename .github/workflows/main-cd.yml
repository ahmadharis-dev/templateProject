name: HTML CD

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        
      - name: Install cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Setup SSH & Deploy
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          SSH_HOST: ssh.serversandgen.web.id
          SSH_USER: ${{ secrets.USERNAME }}
        run: |
          mkdir -p ~/.ssh
          # Pastikan penulisan key tidak ada spasi/line break yang aneh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa-github-action-first-html
          chmod 600 ~/.ssh/id_rsa-github-action-first-html
          
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts

          # Tambahkan -vvv untuk melihat detail error jika gagal lagi
          ssh -vvv -i ~/.ssh/id_rsa-github-action-first-html \
            -o "ProxyCommand=cloudflared access ssh --hostname $SSH_HOST" \
            -o "StrictHostKeyChecking=no" \
            $SSH_USER@$SSH_HOST << 'EOF'
              cd /var/www/html/templateProject
              git pull origin main
              git status
          EOF
   
