name: HTML CD

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        
      - name: Install cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          cloudflared --version

      - name: Setup SSH & Deploy
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          SSH_HOST: ssh.serversandgen.web.id
          SSH_USER: ${{ secrets.USERNAME }}
        run: |
          # Setup SSH
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Test the connection first
          echo "Testing SSH connection..."
          ssh -i ~/.ssh/id_rsa \
            -o "ProxyCommand=cloudflared access ssh --hostname $SSH_HOST" \
            -o "StrictHostKeyChecking=no" \
            -o "UserKnownHostsFile=/dev/null" \
            -o "ConnectTimeout=10" \
            $SSH_USER@$SSH_HOST "echo 'SSH connection successful'"
          
          # If successful, run the deployment
          echo "Running deployment..."
          ssh -i ~/.ssh/id_rsa \
            -o "ProxyCommand=cloudflared access ssh --hostname $SSH_HOST" \
            -o "StrictHostKeyChecking=no" \
            -o "UserKnownHostsFile=/dev/null" \
            $SSH_USER@$SSH_HOST << 'EOF'
              set -e  # Exit on error
              cd /var/www/html/templateProject || { echo "Directory not found"; exit 1; }
              git pull origin main
              git status
              echo "Deployment completed successfully!"
          EOF
